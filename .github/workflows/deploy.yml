name: Deploy to FTP Server

on:
  workflow_dispatch:  # Manual trigger only (FTP data channel can be blocked on some hosts)

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USER }}
        password: ${{ secrets.FTP_PASS }}
        # Deploy whole project root to the application directory on FTP.
        # This keeps public_html/ as webroot and application/library outside it.
        local-dir: ./
        server-dir: /otusbok.otus.pl/bok/
        state-name: .ftp-deploy-sync-state.json
        dangerous-clean-slate: false
        exclude: |
          **/.git*
          **/.github/**
          **/.idea/**
          **/nbproject/**
          **/tmp/**
          **/templates_c/**
          **/.DS_Store
          **/Thumbs.db
